server:
  port: 8084

spring:
  application:
    name: crop-inventory-service
  datasource:
    url: jdbc:mysql://localhost:3306/agms_inventory?createDatabaseIfNotExist=true
    username: root
    password: "1234" # Ensure this matches your MySQL password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
