server:
  port: 8081

spring:
  application:
    name: zone-service

   datasource:
    url: jdbc:mysql://localhost:3306/agms_zone?createDatabaseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # Automatically creates tables for you
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
